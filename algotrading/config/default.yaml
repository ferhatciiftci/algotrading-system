# ──────────────────────────────────────────────────────────────────────────────
# AlgoTrading MVP — Varsayılan Konfigürasyon
# Tüm değerler CLI argümanları veya ortam değişkenleriyle geçersiz kılınabilir.
# ──────────────────────────────────────────────────────────────────────────────

system:
  name: "algotrading_mvp"
  version: "0.1.0"
  env: "backtest"            # backtest | paper  (live desteklenmiyor)
  log_level: "INFO"
  random_seed: 42

data:
  # Veri deposunun kök dizini.
  # Hem download.py hem main.py bu yolu kullanır.
  # run_backtest.py'den çalıştırıldığında proje kökü baz alınır.
  root_dir: "data"
  window_size: 500           # sembol başına döngüsel bar tamponu
  bars_per_year: 252         # yıllıklaştırma için

backtest:
  initial_capital: 100000.0
  symbols:
    - "SPY"
  start: "2020-01-01"
  end:   "2024-01-01"

strategy:
  id: "trend_volatility_v1"
  params:
    ema_fast: 20
    ema_slow: 50
    atr_period: 14
    vol_threshold: 0.025     # normalise ATR filtresi

commission:
  model: "fixed_per_share"
  rate_per_share: 0.005
  min_per_order: 1.00

slippage:
  model: "volatility"
  atr_multiple: 0.10
  min_bps: 2.0

risk:
  position_sizer: "fixed_fractional"
  max_risk_pct: 0.01                   # işlem başına özkaynak %1
  atr_stop_mult: 2.0
  max_position_pct: 0.10               # sembol başına özkaynak maks %10
  max_gross_exposure: 0.95
  max_net_exposure: 0.80
  atr_period: 14

kill_switch:
  max_daily_loss_pct: 0.03             # günlük %3 kayıp limiti
  max_drawdown_pct: 0.10               # tepeden %10 düşüş
  max_consecutive_losses: 5

orchestrator:
  cooldown_bars: 3
  min_confidence: 0.0
  allow_short: true

validation:
  walk_forward:
    train_bars: 252
    test_bars: 63
    anchored: false
  overfitting:
    mc_permutations: 1000
    target_efficiency_ratio: 0.5

monitoring:
  pnl_anomaly_threshold_pct: 0.03
  circuit_breaker:
    max_data_delay_s: 300
    max_pnl_velocity_pct: 0.05
    max_error_rate: 0.20
    max_consecutive_errors: 3

learning:
  sandbox_dir: "sandbox_output"
  canary_allocation_pct: 0.10
  canary_min_days: 10
  require_human_approval: true         # ÜRETİMDE ASLA false YAPILMAMALI
